# nginx serves the built Angular app and acts as the API gateway, routing each
# resource path to the microservice that owns it. Upstream hostnames resolve via
# Docker Compose service names / Kubernetes Service names.

upstream catalog_upstream  { server ${CATALOG_HOST}; }
upstream sales_upstream    { server ${SALES_HOST}; }
upstream identity_upstream { server ${IDENTITY_HOST}; }

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Identity / auth
    location /api/auth       { proxy_pass http://identity_upstream; }

    # Catalog-owned resources
    location /api/products   { proxy_pass http://catalog_upstream; }
    location /api/categories { proxy_pass http://catalog_upstream; }

    # Sales-owned resources
    location /api/sales      { proxy_pass http://sales_upstream; }

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SPA fallback: let the Angular router handle unknown client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
