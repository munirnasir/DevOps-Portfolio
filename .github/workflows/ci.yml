name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore services/Pos.slnx

      - name: Build
        run: dotnet build services/Pos.slnx -c Release --no-restore

      - name: Test
        run: dotnet test services/Pos.slnx -c Release --no-build --verbosity normal

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production

      - name: Unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

  images:
    name: Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    strategy:
      matrix:
        include:
          - name: catalog
            context: services/catalog-service
            image: pos-catalog
          - name: sales
            context: services/sales-service
            image: pos-sales
          - name: identity
            context: services/identity-service
            image: pos-identity
          - name: frontend
            context: frontend
            image: pos-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build only (no push). Wire up registry login + push when a registry is available.
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
