apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: pos
  labels:
    app: catalog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: pos-catalog:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: ConnectionStrings__CatalogDb
              value: "Host=postgres;Port=5432;Database=catalogdb;Username=pos;Password=$(POSTGRES_PASSWORD)"
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: key
            - name: Jwt__Issuer
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: issuer
            - name: Jwt__Audience
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: audience
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health/live
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: pos
spec:
  selector:
    app: catalog-service
  ports:
    - port: 8080
      targetPort: 8080
