# Shared JWT signing key. Every service mounts this so tokens minted by the Identity
# service validate everywhere. Replace the value in any real deployment.
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: pos
type: Opaque
stringData:
  key: "dev-only-super-secret-signing-key-change-me-please-32+chars"
  issuer: "pos-identity"
  audience: "pos-services"
