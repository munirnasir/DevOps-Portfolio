apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pos
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: pos-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            # Used by the in-pod nginx gateway; the cluster Ingress also routes /api
            # directly to the services, so either path works.
            - name: CATALOG_HOST
              value: "catalog-service:8080"
            - name: SALES_HOST
              value: "sales-service:8080"
            - name: IDENTITY_HOST
              value: "identity-service:8080"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: pos
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
