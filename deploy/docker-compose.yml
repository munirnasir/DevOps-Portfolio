# Full local stack for the Cash & Carry POS: one Postgres (database-per-service),
# the two .NET 10 microservices, and the Angular frontend acting as the API gateway.
#
#   docker compose -f deploy/docker-compose.yml up --build
#   Frontend:     http://localhost:8080
#   Catalog API:  http://localhost:5001/swagger
#   Sales API:    http://localhost:5002/swagger

name: pos

# Shared JWT signing settings. All services must agree on Key/Issuer/Audience so the
# tokens minted by the Identity service validate everywhere. Override the key in any
# real deployment (it is a demo secret here).
x-jwt-env: &jwt-env
  Jwt__Key: "dev-only-super-secret-signing-key-change-me-please-32+chars"
  Jwt__Issuer: "pos-identity"
  Jwt__Audience: "pos-services"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: pos
      POSTGRES_DB: pos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos"]
      interval: 5s
      timeout: 3s
      retries: 10

  catalog-service:
    build:
      context: ../services/catalog-service
    image: pos-catalog:local
    environment:
      <<: *jwt-env
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__CatalogDb: "Host=postgres;Port=5432;Database=catalogdb;Username=pos;Password=pos"
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy

  sales-service:
    build:
      context: ../services/sales-service
    image: pos-sales:local
    environment:
      <<: *jwt-env
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__SalesDb: "Host=postgres;Port=5432;Database=salesdb;Username=pos;Password=pos"
      Services__CatalogBaseUrl: "http://catalog-service:8080"
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
      catalog-service:
        condition: service_started

  identity-service:
    build:
      context: ../services/identity-service
    image: pos-identity:local
    environment:
      <<: *jwt-env
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__IdentityDb: "Host=postgres;Port=5432;Database=identitydb;Username=pos;Password=pos"
    ports:
      - "5003:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
    image: pos-frontend:local
    environment:
      CATALOG_HOST: "catalog-service:8080"
      SALES_HOST: "sales-service:8080"
      IDENTITY_HOST: "identity-service:8080"
    ports:
      - "8080:80"
    depends_on:
      - catalog-service
      - sales-service
      - identity-service

volumes:
  pgdata:
